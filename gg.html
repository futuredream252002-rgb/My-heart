<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sweetheart 💖</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            transition: all 0.5s ease;
        }
        h1 {
            color: #ff477e;
            margin-bottom: 20px;
            font-size: 1.5rem;
            line-height: 1.6;
        }
        .btn {
            background-color: #ff7096;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(255, 112, 150, 0.4);
        }
        .btn:hover {
            background-color: #ff477e;
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .heart {
            font-size: 5rem;
            color: #ff477e;
            animation: beat 0.6s infinite alternate;
            margin-top: 15px;
        }
        @keyframes beat {
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="text-display">ဟေ့လူဆိုးမလေး... မင်းကိုပြောစရာရှိလို့ တချက်လောက်နှိပ်ကြည့်ပေးပါဦး။ 🥰</h1>
        <button class="btn" id="next-btn" onclick="nextStep()">နှိပ်လိုက်ပါ</button>
        <div id="heart-space"></div>
    </div>

    <script>
        let step = 0;
        
        // ဒီနေရာမှာ ကိုယ်ရေးချင်တဲ့ စာသားလေးတွေကို အဆင့်ဆင့် ပြောင်းလဲပြင်ဆင်နိုင်ပါတယ်နော်
        const messages = [
            "သိလား... ကိုယ့်ကမ္ဘာထဲကို မင်းရောက်လာကတည်းက အရာရာဟာ ပိုပြီးလှပလာခဲ့တာ။ 🌸",
            "မင်းရဲ့အပြုံးလေးတွေ၊ မင်းရဲ့စကားသံလေးတွေက ကိုယ့်အတွက် အားဆေးတွေပဲ။ ☀️",
            "တခါတလေ စိတ်ကောက်တာလေးတွေကအစ ကိုယ့်မျက်စိထဲမှာ အရမ်းချစ်ဖို့ကောင်းနေရောပဲ။ 🥺",
            "မင်းနဲ့ပတ်သက်တဲ့ အရာရာတိုင်းကို ကိုယ် အရမ်းမြတ်နိုးတယ်။",
            "နောက်ဆုံးအဆင့်ကို မနှိပ်ခင် မျက်လုံးလေးခဏမှိတ်ပြီး ဆုတောင်းလိုက်ဦးနော်... 🤫",
            "ကိုယ့်ဘဝရဲ့ စာမျက်နှာတိုင်းမှာ မင်းပဲရှိနေပေးပါ။ ကိုယ် မင်းကို အရမ်း အရမ်းချစ်တယ်ခင်ဗျာ... 💖✨"
        ];

        function nextStep() {
            const textDisplay = document.getElementById('text-display');
            const nextBtn = document.getElementById('next-btn');
            const heartSpace = document.getElementById('heart-space');

            if (step < messages.length) {
                // စာသားကို အဆင့်ဆင့်ပြောင်းလဲပေးခြင်း
                textDisplay.innerHTML = messages[step];
                step++;
                
                // နောက်ဆုံးအဆင့်ရောက်ရင် Button စာသားပြောင်းမယ်
                if (step === messages.length) {
                    nextBtn.innerHTML = "ကိုယ့်ရဲ့ အဖြေလွှာလေး 💌";
                }
            } else {
                // အားလုံးနှိပ်ပြီးသွားတဲ့ အခါမှာ ပေါ်လာမယ့် စာမျက်နှာ
                textDisplay.innerHTML = "ချစ်လွန်းလို့ ရင်ခုန်သံတွေ ထိန်းမရတော့ဘူး! 🙈💕<br><br><b>I Love You More Than Yesterday!</b>";
                nextBtn.style.display = 'none'; // Button ကို ဖျောက်လိုက်မယ်
                
                // ခုန်နေတဲ့ နှလုံးသားပုံစံလေး ထည့်ပေးမယ်
                heartSpace.innerHTML = '<div class="heart">❤️</div>';
            }
        }
    </script>
</body>
</html>
